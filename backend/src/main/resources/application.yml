server:
  port: 8080

spring:
  config:
    import: optional:classpath:application-local.yml
  application:
    name: shop-pilot-backend
  datasource:
    url: jdbc:mysql://localhost:3306/shop_pilot?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: ${SHOP_PILOT_DB_USERNAME:root}
    password: ${SHOP_PILOT_DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: localhost
      port: 6379

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true

shop-pilot:
  jwt:
    secret: ${SHOP_PILOT_JWT_SECRET:shop-pilot-dev-jwt-secret-key-at-least-32-bytes}
    expiration-seconds: 7200
